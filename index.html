<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedtyper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="stats">
            <span>WPM: <span id="wpm">0</span></span>
            <span>Accuracy: <span id="accuracy">100</span>%</span>
        </div>
        <div id="typing-area">
            <p id="target-text"></p>
            <input type="text" id="user-input" autofocus autocomplete="off">
        </div>
        <div id="message">Press any key to start</div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
